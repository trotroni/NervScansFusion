name: Build NervScansFusion (macOS + Windows)

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:

  # =========================
  # macOS BUILD + DMG
  # =========================
  build-macos:
    name: macOS build + DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.0'
          host: 'mac'
          target: 'desktop'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run macdeployqt
        run: |
          macdeployqt build/NervScansFusion.app -verbose=2

      - name: Create DMG
        run: |
          mkdir dmg
          cp -R build/NervScansFusion.app dmg/

          hdiutil create \
            -volname NervScansFusion \
            -srcfolder dmg \
            -ov -format UDZO NervScansFusion-macOS.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: NervScansFusion-macOS
          path: NervScansFusion-macOS.dmg


  # =========================
  # WINDOWS BUILD + ZIP
  # =========================
  build-windows:
    name: Windows build + ZIP
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.0'
          host: 'windows'
          target: 'desktop'

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt dependencies
        run: |
          windeployqt build/Release/NervScansFusion.exe

      - name: Create ZIP package
        run: |
          powershell Compress-Archive `
            -Path build/Release/* `
            -DestinationPath NervScansFusion-Windows.zip

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: NervScansFusion-Windows
          path: NervScansFusion-Windows.zip