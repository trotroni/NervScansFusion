name: Build & Package NervScansFusion (Windows)

on:
  push:
    branches: [main, develop, master]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  QT_VERSION:  "6.6.3"
  APP_NAME:    "NervScansFusion"
  BUILD_TYPE:  "Release"

jobs:
  build-windows:
    name: Windows (MSVC + Inno Setup)
    runs-on: windows-latest

    steps:
      # ── 1. Sources ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Qt ───────────────────────────────────────────────────────────────
      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version:          ${{ env.QT_VERSION }}
          host:             windows
          target:           desktop
          arch:             win64_msvc2019_64
          cache:            true
          cache-key-prefix: qt-win64-msvc

      # ── 3. MSVC ──────────────────────────────────────────────────────────────
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" ^
            -A x64

      - name: Build
        shell: cmd
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      # ── 5. windeployqt ───────────────────────────────────────────────────────
      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          mkdir deploy
          copy "build\${{ env.BUILD_TYPE }}\${{ env.APP_NAME }}.exe" deploy\

          windeployqt.exe ^
            --release ^
            --no-translations ^
            --no-system-d3d-compiler ^
            --no-opengl-sw ^
            --dir deploy ^
            deploy\${{ env.APP_NAME }}.exe

          echo Contenu deploy :
          dir deploy /s /b

      # ── 6. Inno Setup ────────────────────────────────────────────────────────
      - name: Build Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" ^
            /DMyAppVersion="${{ github.ref_name }}" ^
            /DSourceDir="%CD%\deploy" ^
            installer\windows\setup.iss

      # ── 7. Upload artefact ───────────────────────────────────────────────────
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name:            ${{ env.APP_NAME }}-Windows-Setup
          path:            dist/${{ env.APP_NAME }}-Setup.exe
          retention-days:  30

      # ── 8. Release (tag v* uniquement) ───────────────────────────────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.APP_NAME }}-Setup.exe